    // 注意：这里的 <\/script> 都是为了防止 HTML 解析器报错和误执行弹窗（防自伤 XSS）
    const questionsData = [
      // --- 1. 概述 ---
      { c: "1. 概述", t: "简答", q: "什么原因导致了网络信息安全威胁的产生?", a: "（1）协议缺陷：TCP/IP协议簇是目前使用最为广泛的网络互联协议，但协议簇本身存在着一些安全缺陷。\n（2）软件漏洞：在操作系统和应用系统中，所有软件都有可能存在漏洞。\n（3）策略弱点：如果安全策略在设计时考虑不周，或实现时对安全机制选择不当。安全需求和应用需求相矛盾时，用户更愿意选择在安全策略方面做出妥协。\n（4）硬件漏洞：CPU、BIOS等硬件设备中，也会出现漏洞。危害严重，影响范围大，且难修复。\n（5）人为因素。一方面攻击者的成分复杂，多数掌握着丰富的攻击资源。另一方面防御者则缺乏专业人才，信息系统管理人员的人性弱点或者不合理操作，普通用户安全意识淡薄。", e: "此题目没有标准答案，答出基本要点即可。" },
      { c: "1. 概述", t: "简答", q: "有人说只要我有足够多的钱，就可以采购到自己想要的安全设备来保障本单位的网络安全不受攻击。你是否同意这一说法，为什么?", a: "这种说的不正确。虽然充足的资金是网络安全建设的重要基础，但仅靠采购高端安全设备并不能绝对保证网络安全。\n分析：\n1、设备本身存在局限性。\n（1）即使是最先进的安全设备，也难以应对所有未知的新型网络攻击。黑客不断开发新的攻击手段和技术，而安全设备的更新往往具有滞后性。\n（2）安全设备主要聚焦于网络层面的防护，难以全面应对非技术手段的攻击。可能利用社交工程手段诱使员工泄露敏感信息。\n2、网络安全是体系化工程。\n（1）人员因素至关重要：人是网络安全的第一道防线，也是最薄弱的环节。无论投入多少资金，若员工缺乏安全意识，攻击者仍可通过社会工程学突破。同时需要专业运维人员。\n（2）安全策略和制度不可或缺：有效的防护需要完善的策略和制度支撑，与设备配合形成完整体系。", e: "此题目没有标准答案，答出基本要点即可得分。" },
      { c: "1. 概述", t: "单选", q: "安全属性“CIA”不包括( )。", o: ["A、完整性", "B、机密性", "C、可用性", "D、可控性"], a: "D", e: "CIA指的是机密性(Confidentiality)、完整性(Integrity)、可用性(Availability)。" },
      { c: "1. 概述", t: "单选", q: "属于被动攻击的是( )。", o: ["A、中断", "B、截获", "C、篡改", "D、伪造"], a: "B", e: "截获属于被动攻击（如搭线窃听），只获取信息而不修改内容；中断、篡改、伪造属于主动攻击。" },
      { c: "1. 概述", t: "单选", q: "下列攻击中，主要针对可用性的攻击是( )。", o: ["A、中断", "B、截获", "C、篡改", "D、伪造"], a: "A", e: "中断攻击（如DoS）破坏了系统的可用性，使用户无法正常使用服务。" },
      { c: "1. 概述", t: "单选", q: "下列攻击中，主要针对机密性的攻击是( )。", o: ["A、中断", "B、截获", "C、篡改", "D、伪造"], a: "B", e: "截获攻击获取了未授权的信息，破坏了数据的机密性。" },
      { c: "1. 概述", t: "单选", q: "信息在传送过程中，如果接收方接收到的信息与发送方发送的信息不同，则信息的( )遭到了破坏。", o: ["A、可用性", "B、不可否认性", "C、完整性", "D、机密性"], a: "C", e: "信息被修改或损坏，说明其完整性遭到了破坏。" },
      { c: "1. 概述", t: "单选", q: "信息在传送过程中，通信量分析破坏了信息的( )。", o: ["A、可用性", "B、不可否认性", "C、完整性", "D、机密性"], a: "D", e: "通信量分析属于被动攻击，试图通过分析通信模式来推测出有价值的信息，破坏了机密性。" },

      // --- 2. 渗透测试 ---

      { c: "2. 渗透测试", t: "单选", q: "哪种渗透测试类型涉及到对系统的未授权访问?", o: ["A、白盒测试", "B、黑盒测试", "C、灰盒测试", "D、玻璃盒测试"], a: "B", e: "黑盒测试通常模拟外部黑客在没有系统内部信息和授权凭证的情况下进行探测。" },
      { c: "2. 渗透测试", t: "单选", q: "以下哪项不属于渗透测试的步骤?", o: ["A、信息收集", "B、漏洞分析", "C、系统维护", "D、利用漏洞"], a: "C", e: "系统维护属于运维工作，不属于渗透测试的阶段。" },
      { c: "2. 渗透测试", t: "单选", q: "渗透测试中，哪个阶段是获取目标系统信息的过程?", o: ["A、信息收集", "B、漏洞分析", "C、漏洞利用", "D、报告撰写"], a: "A", e: "信息收集是第一步，尽最大可能获取目标系统的相关信息。" },
      { c: "2. 渗透测试", t: "判断", q: "渗透测试可以不经授权进行。", o: ["√", "×"], a: "×", e: "渗透测试必须经过授权和合法许可，否则属于违法黑客行为。" },
      { c: "2. 渗透测试", t: "判断", q: "渗透测试者在测试过程中可以修改或删除数据。", o: ["√", "×"], a: "×", e: "渗透测试采用可控制、非破坏性质的方法，不能恶意修改或删除数据。" },
      { c: "2. 渗透测试", t: "判断", q: "渗透测试的目的是发现并利用系统漏洞。", o: ["√", "×"], a: "×", e: "目的是评估安全性、发现漏洞并提供修复建议，而不仅仅是为了利用漏洞（利用只是验证手段）。" },
      { c: "2. 渗透测试", t: "判断", q: "渗透测试报告应该包含测试者对发现的安全问题的分析和建议。", o: ["√", "×"], a: "√", e: "报告需记录问题影响并给出修补升级方案。" },
      { c: "2. 渗透测试", t: "判断", q: "渗透测试者在测试结束后应该清理所有测试痕迹。", o: ["√", "×"], a: "√", e: "为了不影响业务和留下安全隐患，测试结束后需清理痕迹（如测试账号、后门文件等）。" },
      { c: "2. 渗透测试", t: "简答", q: "请描述PTES（渗透测试执行标准）定义的渗透测试的一般流程。(渗透测试有哪几个步骤?每个步骤的任务是什么?)", a: "（1）前期交互：与客户沟通，确定范围、目标、限制并签合同。\n（2）情报收集：使用公开资源获取目标相关信息。\n（3）威胁建模：利用信息标识漏洞缺陷，进行攻击规划。\n（4）漏洞分析：发现可被利用的缺陷。\n（5）渗透利用/漏洞攻击：利用漏洞入侵系统，获取访问权。\n（6）后渗透/深度利用：拿到权限后的后续操作（权限维持、内网渗透）。\n（7）书面报告：向客户提交包含问题、影响及修复方案的报告。", e: "掌握PTES七大步骤核心内容。" },
      { c: "2. 渗透测试", t: "简答", q: "什么是渗透测试？渗透测试与网络攻击有什么区别？", a: "定义：是通过模拟恶意黑客的攻击方法，来评估计算机网络系统安全的一种评估方法。\n区别：\n（1）授权性：渗透测试是经过授权和合法许可的；网络攻击是未经授权的。\n（2）性质：渗透测试采用可控制、非破坏性的方法；网络攻击具有恶意目的和破坏性。\n（3）目的：渗透测试旨在评估安全、发现漏洞并提供建议；网络攻击旨在窃取数据、破坏系统。", e: "核心在于授权与破坏性的区别。" },

      // --- 3. 信息收集 ---
      { c: "3. 信息收集", t: "单选", q: "以下哪个命令可以用于扫描目标IP 地址所在的段()?", o: ["A、nmap 192.168.1.0/24", "B、nmap 192.168.1.1-100", "C、nmap 192.168.1.1-254 -p 80", "D、nmap 192.168.1.1"], a: "A", e: "192.168.1.0/24 表示整个C段网络。" },
      { c: "3. 信息收集", t: "单选", q: "以下哪个命令可以用于扫描目标系统并检测是否存在漏洞()?", o: ["A、nmap -sS target_ip", "B、nmap --script vuln target_ip", "C、nmap -sV target_ip", "D、nmap -O target_ip"], a: "B", e: "--script vuln 调用了nmap的漏洞扫描脚本库。" },
      { c: "3. 信息收集", t: "单选", q: "使用Whois查询可以获取以下哪些信息()?", o: ["A、域名注册人信息", "B、目标系统的漏洞", "C、目标系统的操作系统", "D、目标系统的开放端口"], a: "A", e: "Whois用于查询域名的IP及所有人、注册商等基本信息。" },
      { c: "3. 信息收集", t: "单选", q: "使用Google hacking搜索时，以下哪个操作符可以用于查找特定文件类型( )?", o: ["A、site:", "B、filetype:", "C、intitle:", "D、inurl:"], a: "B", e: "filetype: 用于指定搜索的文件格式，如 filetype:pdf。" },
      { c: "3. 信息收集", t: "单选", q: "以下哪个选项可以用于检测目标系统的操作系统？", o: ["A、-sV", "B、-O", "C、-A", "D、-p"], a: "B", e: "-O 参数在nmap中用于启用操作系统探测。" },

      { c: "3. 信息收集", t: "单选", q: "C段扫描的主要目的是什么( )?", o: ["A、枚举目标域名的子域名", "B、获取目标主机的操作系统信息", "C、发现同一网段中的其他潜在目标", "D、检测目标网站的漏洞"], a: "C", e: "C段扫描是为了发现与目标主机在同一网段（1-254）的其他可能防护薄弱的机器。" },
      { c: "3. 信息收集", t: "单选", q: "以下哪种方法属于主动信息收集( )?", o: ["A、使用Shodan搜索", "B、查询Whois信息", "C、使用Nmap进行端口扫描", "D、使用Google hacking搜索"], a: "C", e: "主动收集会与目标系统产生直接交互（如Nmap发包），留下日志；其他选项均为利用第三方平台的被动收集。" },
      { c: "3. 信息收集", t: "单选", q: "以下哪种方法可以用于绕过CDN获取目标网站的真实IP()?", o: ["A、使用Nmap扫描", "B、使用Wireshark捕获流量", "C、查询历史DNS记录", "D、使用Wappalyzer浏览器插件"], a: "C", e: "CDN通常是后来接入的，通过查询历史DNS解析记录，有可能找到接入CDN之前的真实服务器IP。" },

      { c: "3. 信息收集", t: "单选", q: "以下哪项不是常见的社会工程学手段()?", o: ["A、物理入侵", "B、钓鱼邮件", "C、网络钓鱼", "D、电话诈骗"], a: "A", e: "物理入侵属于物理安全范畴，社会工程学主要利用人性的弱点（如贪婪、恐惧、好奇心）进行欺骗。" },
      { c: "3. 信息收集", t: "单选", q: "Nmap 的主要功能是什么()?", o: ["A、密码破解", "B、网络流量分析", "C、漏洞利用", "D、网络扫描"], a: "D", e: "Nmap 是一款开源的网络探测和安全审核（端口扫描）工具。" },
      { c: "3. 信息收集", t: "判断", q: "信息收集是网络攻击的第一步，目的是尽可能多地获取目标系统的相关信息。", o: ["√", "×"], a: "√", e: "知己知彼百战不殆，信息收集是渗透测试/网络攻击的基础。" },

              <div className="max-w-4xl mx-auto w-full">
                <div className="mb-6 flex items-center justify-between">
                  <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-md text-sm font-bold shadow-sm">{currentQ.t}题</span>
                  <span className="text-slate-400 font-medium">题目 {currentIndex + 1} / {questionsData.length}</span>
                </div>

                <h2 className="text-xl lg:text-2xl font-semibold leading-relaxed mb-8 text-slate-800 break-words">{currentQ.q}</h2>

                <div className="space-y-4">
                  {currentQ.t === '简答' ? (
                    <div className="flex flex-col gap-4">
                      <textarea 
                        className="w-full h-32 p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-none transition-all outline-none"
                        placeholder="请在此输入你的思考和答案..."
                        value={shortAnswerText[currentIndex] || ''}
                        onChange={(e) => setShortAnswerText({...shortAnswerText, [currentIndex]: e.target.value})}
                        disabled={isAnswered}
                      />
                      {!isAnswered ? (
                        <button onClick={() => handleOptionSelect('查看了答案')} className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors shadow-md self-start">
                          提交并核对答案
                        </button>
                      ) : (
                        <div className="flex flex-wrap gap-4 items-center">
                           <span className="text-sm font-medium text-slate-500">自评掌握程度：</span>
                           <button onClick={() => handleOptionSelect('掌握')} className={`px-4 py-2 rounded-lg font-medium transition ${userAnswers[currentIndex] === '掌握' ? 'bg-green-500 text-white' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>完全掌握</button>
                           <button onClick={() => handleOptionSelect('需复习')} className={`px-4 py-2 rounded-lg font-medium transition ${userAnswers[currentIndex] === '需复习' ? 'bg-orange-500 text-white' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>还需复习</button>
                        </div>
                      )}
                    </div>
                  ) : (
                    currentQ.o && currentQ.o.map((opt, i) => {
                      const optValue = currentQ.t === '单选' ? opt.charAt(0) : opt;
                      const isSelected = userAnswers[currentIndex] === optValue;
                      let optionClass = "bg-white border-2 border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-indigo-50";
                      
                      if (isAnswered) {
                        const isCorrectOpt = optValue === currentQ.a;
                        if (isCorrectOpt) optionClass = "bg-green-50 border-2 border-green-500 text-green-800";
                        else if (isSelected) optionClass = "bg-red-50 border-2 border-red-500 text-red-800";
                        else optionClass = "bg-slate-50 border-2 border-slate-200 text-slate-400 opacity-60";
                      } else if (isSelected) {
                         optionClass = "bg-indigo-50 border-2 border-indigo-500 text-indigo-800";
                      }

                      return (
                        <button key={i} disabled={isAnswered} onClick={() => handleOptionSelect(optValue)} className={`w-full text-left p-4 lg:p-5 rounded-xl font-medium transition-all duration-200 flex items-center justify-between group ${optionClass}`}>
                          <span className="break-words mr-4">{opt}</span>
                          {isAnswered && optValue === currentQ.a && <IconCheckCircle className="text-green-500 shrink-0" />}
                          {isAnswered && isSelected && optValue !== currentQ.a && <IconXCircle className="text-red-500 shrink-0" />}
                        </button>
                      );
                    })
                  )}
                </div>

                {/* 丝滑展现解析区 */}
                <div className={`mt-8 overflow-hidden transition-all duration-500 ease-in-out rounded-2xl ${isAnswered ? 'max-h-[800px] opacity-100 ring-1 ring-slate-200 shadow-sm' : 'max-h-0 opacity-0'}`}>
                  <div className="bg-white p-6 md:p-8">
                    <div className="flex items-start gap-3 mb-4">
                       <div className={`p-2 rounded-full mt-1 ${isCorrect || currentQ.t === '简答' ? 'bg-green-100' : 'bg-red-100'}`}>
                         {isCorrect || currentQ.t === '简答' ? <IconCheckCircle className="text-green-600" /> : <IconXCircle className="text-red-600" />}
                       </div>
                       <div>
                          <h3 className={`text-xl font-bold ${isCorrect || currentQ.t === '简答' ? 'text-green-600' : 'text-red-600'}`}>
                            {currentQ.t === '简答' ? '参考答案与解析' : (isCorrect ? '回答正确！' : `回答错误。正确答案是 ${currentQ.a}`)}
                          </h3>
                       </div>
                    </div>
                    
                    {currentQ.t === '简答' && (
                      <div className="mb-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                         <p className="text-sm font-semibold text-slate-500 mb-2">标准答案：</p>
                         <p className="text-slate-800 whitespace-pre-wrap leading-relaxed">{currentQ.a}</p>
                      </div>
                    )}
                    
                    <div className="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100">
                      <div className="flex items-center gap-2 mb-2 text-indigo-800 font-semibold">
                        <IconHelpCircle /> 解析说明
                      </div>
                      <p className="text-indigo-900/80 leading-relaxed whitespace-pre-wrap text-sm md:text-base">
                        {currentQ.e || '本题暂无详细解析。'}
                      </p>
                    </div>
                  </div>
                </div>

              </div>
            </div>

            <div className="bg-white border-t px-4 py-4 lg:px-8 flex justify-between items-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
              <button onClick={prevQuestion} disabled={currentIndex === 0} className={`flex items-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-all ${currentIndex === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>
                <IconChevronLeft /> 上一题
              </button>
              
              <div className="hidden md:block text-sm font-medium text-slate-400">
                （答题后，下方自动滑出解析）
              </div>

              <button onClick={nextQuestion} disabled={currentIndex === questionsData.length - 1} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-bold transition-all shadow-sm ${currentIndex === questionsData.length - 1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-md'}`}>
                下一题 <IconChevronRight />
              </button>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
